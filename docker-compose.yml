version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: linux-lab-app
    volumes:
      - ./app:/app        # Mount local app folder for live editing
    environment:
      - ENV=development
    restart: unless-stopped

