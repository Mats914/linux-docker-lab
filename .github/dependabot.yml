# =============================================================================
# dependabot.yml — Placera denna fil i .github/dependabot.yml
# -----------------------------------------------------------------------------
# Håller den digest-pinnade basavbilden i Dockerfile uppdaterad automatiskt.
# Dependabot öppnar en pull request så fort Canonical publicerar en ny
# ubuntu:22.04-digest (t.ex. vid säkerhetsuppdateringar), istället för att
# digesten fryses fast permanent.
# =============================================================================
 
version: 2
updates:
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "docker"
 